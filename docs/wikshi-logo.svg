<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Background -->
  <rect width="320" height="80" rx="12" fill="#12101e"/>
  <!-- Subtle gradient wash -->
  <rect width="320" height="80" rx="12" fill="url(#gw)" opacity="0.04"/>
  <defs>
    <radialGradient id="gw" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#c8b6f0"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Accent dot -->
  <circle cx="52" cy="28" r="3" fill="#c8b6f0"/>
  <!-- WIKSHI text -->
  <text x="62" y="38" fill="white" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="26" font-weight="800" letter-spacing="0.5">WIKSHI</text>
  <!-- PROTOCOL subtitle -->
  <text x="64" y="54" fill="#c8b6f0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="9" font-weight="700" letter-spacing="4" opacity="0.7">PROTOCOL</text>
  <!-- Right edge gradient line -->
  <line x1="319" y1="0" x2="319" y2="80" stroke="url(#edge)" stroke-width="1"/>
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8b6f0" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#3D3565" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <!-- Bottom accent line -->
  <line x1="52" y1="62" x2="200" y2="62" stroke="url(#bline)" stroke-width="1"/>
  <defs>
    <linearGradient id="bline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3D3565"/>
      <stop offset="60%" stop-color="#3D3565" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
</svg>
